name: VAR
camel_case: Variance
group: Statistic Functions
hint: Variance
flags: [stream]
inputs:
  - name: inReal
    type: real
optional_inputs:
  - name: optInTimePeriod
    type: integer
    display_name: Time Period
    hint: Time period
    range: [1, 100000]
    default: 5
    suggested: [1, 200, 1]
  - name: optInNbDev
    type: real
    display_name: Deviations
    hint: Nb of deviations
    range: [TA_REAL_MIN, TA_REAL_MAX]
    default: 1
    precision: 2
    suggested: [-2, 2, 0.2]
outputs:
  - name: outReal
    type: real
    flags: [line]
