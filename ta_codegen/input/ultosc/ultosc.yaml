name: ULTOSC
camel_case: UltOsc
group: Momentum Indicators
hint: Ultimate Oscillator
flags: []
inputs:
  - name: inPriceHLC
    type: price
    price_components: [high, low, close]
optional_inputs:
  - name: optInTimePeriod1
    type: integer
    display_name: First Period
    hint: Number of bars for 1st period.
    range: [1, 100000]
    default: 7
    suggested: [1, 200, 1]
  - name: optInTimePeriod2
    type: integer
    display_name: Second Period
    hint: Number of bars fro 2nd period
    range: [1, 100000]
    default: 14
    suggested: [1, 200, 1]
  - name: optInTimePeriod3
    type: integer
    display_name: Third Period
    hint: Number of bars for 3rd period
    range: [1, 100000]
    default: 28
    suggested: [1, 200, 1]
outputs:
  - name: outReal
    type: real
    flags: [line]
