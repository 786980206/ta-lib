name: ROCP
camel_case: RocP
group: Momentum Indicators
hint: "Rate of change Percentage: (price-prevPrice)/prevPrice"
flags: [stream]
inputs:
  - name: inReal
    type: real
optional_inputs:
  - name: optInTimePeriod
    type: integer
    display_name: Time Period
    hint: Number of period
    range: [1, 100000]
    default: 10
    suggested: [1, 200, 1]
outputs:
  - name: outReal
    type: real
    flags: [line]
