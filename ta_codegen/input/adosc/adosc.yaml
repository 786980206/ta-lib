name: ADOSC
camel_case: AdOsc
group: Volume Indicators
hint: Chaikin A/D Oscillator
flags: [stream, start_dependent]
inputs:
  - name: inPriceHLCV
    type: price
    price_components: [high, low, close, volume]
optional_inputs:
  - name: optInFastPeriod
    type: integer
    display_name: Fast Period
    hint: Period of the fast MA
    range: [2, 100000]
    default: 3
    suggested: [4, 200, 1]
  - name: optInSlowPeriod
    type: integer
    display_name: Slow Period
    hint: Period of the slow MA
    range: [2, 100000]
    default: 10
    suggested: [4, 200, 1]
outputs:
  - name: outReal
    type: real
    flags: [line]
