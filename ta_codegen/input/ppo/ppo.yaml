name: PPO
camel_case: Ppo
group: Momentum Indicators
hint: Percentage Price Oscillator
flags: [stream]
inputs:
  - name: inReal
    type: real
optional_inputs:
  - name: optInFastPeriod
    type: integer
    display_name: Fast Period
    hint: Period of the fast MA
    range: [2, 100000]
    default: 12
    suggested: [4, 200, 1]
  - name: optInSlowPeriod
    type: integer
    display_name: Slow Period
    hint: Period of the slow MA
    range: [2, 100000]
    default: 26
    suggested: [4, 200, 1]
  - name: optInMAType
    type: enum:MAType
    display_name: MA Type
    hint: Type of Moving Average
    default: 1
outputs:
  - name: outReal
    type: real
    flags: [line]
