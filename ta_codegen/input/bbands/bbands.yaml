name: BBANDS
camel_case: Bbands
group: Overlap Studies
hint: Bollinger Bands
flags: [overlap]
inputs:
  - name: inReal
    type: real
optional_inputs:
  - name: optInTimePeriod
    type: integer
    display_name: Time Period
    hint: Number of period
    range: [2, 100000]
    default: 5
    suggested: [4, 200, 1]
  - name: optInNbDevUp
    type: real
    display_name: Deviations up
    hint: Deviation multiplier for upper band
    range: [TA_REAL_MIN, TA_REAL_MAX]
    default: 2
    precision: 2
    suggested: [-2, 2, 0.2]
  - name: optInNbDevDn
    type: real
    display_name: Deviations down
    hint: Deviation multiplier for lower band
    range: [TA_REAL_MIN, TA_REAL_MAX]
    default: 2
    precision: 2
    suggested: [-2, 2, 0.2]
  - name: optInMAType
    type: enum:MAType
    display_name: MA Type
    hint: Type of Moving Average
    default: 0
outputs:
  - name: outRealUpperBand
    type: real
    flags: [upper_limit]
  - name: outRealMiddleBand
    type: real
    flags: [line]
  - name: outRealLowerBand
    type: real
    flags: [lower_limit]
