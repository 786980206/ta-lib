name: ADX
camel_case: Adx
group: Momentum Indicators
hint: Average Directional Movement Index
flags: [unstable_period, stream]
inputs:
  - name: inPriceHLC
    type: price
    price_components: [high, low, close]
optional_inputs:
  - name: optInTimePeriod
    type: integer
    display_name: Time Period
    hint: Number of period
    range: [2, 100000]
    default: 14
    suggested: [4, 200, 1]
outputs:
  - name: outReal
    type: real
    flags: [line]
