name: MINMAX
camel_case: MinMax
group: Math Operators
hint: Lowest and highest values over a specified period
flags: [overlap, stream]
inputs:
  - name: inReal
    type: real
optional_inputs:
  - name: optInTimePeriod
    type: integer
    display_name: Time Period
    hint: Number of period
    range: [2, 100000]
    default: 30
    suggested: [4, 200, 1]
outputs:
  - name: outMin
    type: real
    flags: [line]
  - name: outMax
    type: real
    flags: [line]
