name: IMI
camel_case: Imi
group: Momentum Indicators
hint: Intraday Momentum Index
flags: []
inputs:
  - name: inPriceOC
    type: price
    price_components: [open, close]
optional_inputs:
  - name: optInTimePeriod
    type: integer
    display_name: Time Period
    hint: Number of period
    range: [2, 100000]
    default: 14
    suggested: [4, 200, 1]
outputs:
  - name: outReal
    type: real
    flags: [line]
