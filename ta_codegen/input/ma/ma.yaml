name: MA
camel_case: MovingAverage
group: Overlap Studies
hint: Moving average
flags: [overlap]
inputs:
  - name: inReal
    type: real
optional_inputs:
  - name: optInTimePeriod
    type: integer
    display_name: Time Period
    hint: Number of period
    range: [1, 100000]
    default: 30
    suggested: [1, 200, 1]
  - name: optInMAType
    type: enum:MAType
    display_name: MA Type
    hint: Type of Moving Average
    default: 0
outputs:
  - name: outReal
    type: real
    flags: [line]
