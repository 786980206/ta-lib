name: T3
camel_case: T3
group: Overlap Studies
hint: Triple Exponential Moving Average (T3)
flags: [overlap, unstable_period]
streaming: true
inputs:
  - name: inReal
    type: real
optional_inputs:
  - name: optInTimePeriod
    type: integer
    display_name: Time Period
    hint: Number of period
    range: [1, 100000]
    default: 5
    suggested: [1, 200, 1]
  - name: optInVFactor
    type: real
    display_name: Volume Factor
    hint: Volume Factor
    range: [0, 1]
    default: 0.7
    precision: 2
    suggested: [0.01, 1, 0.05]
outputs:
  - name: outReal
    type: real
    flags: [line]
