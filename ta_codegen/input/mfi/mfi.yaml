name: MFI
camel_case: Mfi
group: Momentum Indicators
hint: Money Flow Index
flags: [unstable_period]
inputs:
  - name: inPriceHLCV
    type: price
    price_components: [high, low, close, volume]
optional_inputs:
  - name: optInTimePeriod
    type: integer
    display_name: Time Period
    hint: Number of period
    range: [2, 100000]
    default: 14
    suggested: [4, 200, 1]
outputs:
  - name: outReal
    type: real
    flags: [line]
