name: MACDEXT
camel_case: MacdExt
group: Momentum Indicators
hint: MACD with controllable MA type
flags: [stream]
inputs:
  - name: inReal
    type: real
optional_inputs:
  - name: optInFastPeriod
    type: integer
    display_name: Fast Period
    hint: Period of the fast MA
    range: [2, 100000]
    default: 12
    suggested: [4, 200, 1]
  - name: optInFastMAType
    type: enum:MAType
    display_name: Fast MA
    hint: Type of Moving Average for fast MA
    default: 0
  - name: optInSlowPeriod
    type: integer
    display_name: Slow Period
    hint: Period of the slow MA
    range: [2, 100000]
    default: 26
    suggested: [4, 200, 1]
  - name: optInSlowMAType
    type: enum:MAType
    display_name: Slow MA
    hint: Type of Moving Average for slow MA
    default: 0
  - name: optInSignalPeriod
    type: integer
    display_name: Signal Period
    hint: Smoothing for the signal line (period length)
    range: [1, 100000]
    default: 9
    suggested: [1, 200, 1]
  - name: optInSignalMAType
    type: enum:MAType
    display_name: Signal MA
    hint: Type of Moving Average for signal line
    default: 0
outputs:
  - name: outMACD
    type: real
    flags: [line]
  - name: outMACDSignal
    type: real
    flags: [dash_line]
  - name: outMACDHist
    type: real
    flags: [histogram]
