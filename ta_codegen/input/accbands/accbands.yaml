name: ACCBANDS
camel_case: Accbands
group: Overlap Studies
hint: Acceleration Bands
flags: [overlap, stream]
inputs:
  - name: inPriceHLC
    type: price
    price_components: [high, low, close]
optional_inputs:
  - name: optInTimePeriod
    type: integer
    display_name: Time Period
    hint: Number of period
    range: [2, 100000]
    default: 20
    suggested: [4, 200, 1]
outputs:
  - name: outRealUpperBand
    type: real
    flags: [upper_limit]
  - name: outRealMiddleBand
    type: real
    flags: [line]
  - name: outRealLowerBand
    type: real
    flags: [lower_limit]
