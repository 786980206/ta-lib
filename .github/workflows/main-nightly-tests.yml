# Periodic tests of latest main branch
#

name: main nightly tests

# Controls when the workflow will run
on:
  schedule:
    - cron: "0 7 * * *" # every day 7AM

  workflow_dispatch:

jobs:
  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2022]

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          pip install PyGithub

      - name: Prepare shell envs (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "PYTHON=python3" >> $GITHUB_ENV

      - name: Build dist assets (Linux)
        if: runner.os == 'Linux'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          sudo apt update
          sudo apt install -y automake libtool autogen
          sudo apt install -y openjdk-21-jdk
          sudo apt install -y gcc-multilib
          sudo apt install -y gcc-i686-linux-gnu
          sudo apt install -y gcc-aarch64-linux-gnu
          $PYTHON $GITHUB_WORKSPACE/scripts/package.py
          $PYTHON $GITHUB_WORKSPACE/scripts/test-dist.py

      - name: Prepare shell envs (Windows x64)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          :: call "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe > msbuild_path.txt
          :: set /p MSBUILD_PATH=<msbuild_path.txt
          :: set VCVARSALL=%MSBUILD_PATH%\..\..\..\..\VC\Auxiliary\Build\vcvarsall.bat
          :: echo VCVARSALL=%VCVARSALL% >> %GITHUB_ENV%
          echo PYTHON=python >> %GITHUB_ENV%

      # NOTE: one command per step (or && chains). A multi-line `shell: cmd`
      # script propagates only the LAST command's exit code, masking every
      # failure before it. WiX is version-pinned for determinism; v7
      # requires the OSMF EULA acceptance step below.
      - name: Install WiX (Windows x64)
        if: runner.os == 'Windows'
        shell: cmd
        run: dotnet tool install --global wix --version 7.0.0 && echo %USERPROFILE%\.dotnet\tools>>%GITHUB_PATH%

      # TA-Lib generates no revenue, so the Open Source Maintenance Fee does
      # not apply (the OSMF exempts organizations under USD 10k/year), but
      # WiX v7 still requires explicit EULA acceptance (WIX7015 otherwise).
      # Accepted per project-maintainer decision, 2026-07-03.
      - name: Accept WiX OSMF EULA (Windows x64)
        if: runner.os == 'Windows'
        shell: cmd
        run: wix eula accept wix7

      - name: Add WiX UI extension (Windows x64)
        if: runner.os == 'Windows'
        shell: cmd
        run: wix extension add --global WixToolset.UI.wixext/7.0.0 && wix extension list --global

      - name: Build dist assets (Windows x64)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: cmd
        run: '%PYTHON% %GITHUB_WORKSPACE%\scripts\package.py'

      - name: Test dist assets (Windows x64)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: cmd
        run: '%PYTHON% %GITHUB_WORKSPACE%\scripts\test-dist.py'

      - name: Verify dist assets are up-to-date
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          dist_changes=$(git status --porcelain dist/)
          ta_common_changes=$(git status --porcelain include/ta_common.h)
          if [ -n "$dist_changes" ] || [ -n "$ta_common_changes" ]; then
            echo "Error: Unexpected changes in dist/ assets."
            echo "The dev-nigthly-tests.yml should have updated these assets."
            exit 1
          fi

      # Soft check only: the website (website/src/install/README.md) is expected to lag briefly
      # after a release until dev-nightly syncs it and it merges to main. Surface
      # a warning if it is behind, but never fail -- keep the main badge green.
      - name: Warn if website is out of date (soft)
        if: runner.os == 'Linux'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          $PYTHON $GITHUB_WORKSPACE/scripts/sync-website.py --check --warn-only

  # Release gate: prove the library is still bit-identical to v0.6.4 at
  # period>=2. C-only, gated on 'test'. fetch-depth: 0 for the v0.6.4 tag.
  # See src/tools/ta_regtest/CLAUDE.md.
  fuzz-vs-064:
    name: Bit-exact fuzz vs released v0.6.4
    needs: test
    # Run after 'test' but don't let an unrelated failure (e.g. the Windows leg)
    # silently skip this release gate — it has its own checkout+build.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0 # ta_064_serve builds from the released v0.6.4 tag

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Fuzz current library vs frozen v0.6.4
        shell: bash
        run: python3 scripts/build.py fuzz-064

  # Cross-language BITWISE parity gate (issue #113): the generated language
  # servers must be BIT-IDENTICAL to the shipped in-process C library (no
  # tolerance). Rust crosses the JSON boundary with a seed; Java with lossless hex
  # inputs (#114), its transcendental-using calls relaxed to a tolerance (fdlibm
  # != the C libm). cmake+gcc+cargo are preinstalled on ubuntu-latest; the Java
  # server needs the JDK (no .NET — it P/Invokes C == C).
  xlang-hash:
    name: Bitwise parity (C vs Rust + Java, seed/hex+hash)
    needs: test
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install JDK
        shell: bash
        run: |
          sudo apt update
          sudo apt install -y openjdk-21-jdk

      - name: Bitwise-diff each language server vs the in-process C library
        shell: bash
        run: python3 scripts/build.py xlang-hash
