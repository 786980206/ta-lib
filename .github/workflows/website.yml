# ta-lib.org deployment — VuePress (vuepress-theme-hope) build → gh-pages.
#
# Mirrors the proven sui-cookbook / suibase VuePress deploy: pinned pnpm
# (an explicit version avoids pnpm/action-setup's self-update crash that hit
# "latest"), frozen-lockfile install, build, then JamesIves gh-pages deploy.
name: Website

on:
  push:
    branches: [main]
    # Only redeploy when the site actually changes. The generated function
    # pages live under website/src/functions/, so they are covered too.
    # `workflow_dispatch` still forces a manual deploy regardless.
    paths:
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The theme's git plugin is disabled (git: false), so a shallow
          # clone is fine; full history is not needed here.
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.2.2"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: website

      - name: Build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |
          pnpm run docs:build
          > src/.vuepress/dist/.nojekyll
        working-directory: website

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: website/src/.vuepress/dist
