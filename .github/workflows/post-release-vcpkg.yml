# Automatically generates the TA-Lib vcpkg update plan when a new release is
# published, and posts it as a workflow summary.
#
# No PAT or secret is required — the script only reads public GitHub APIs and
# computes the SHA512 of the release tarball.
#
# The workflow checks out the release tag so the VERSION file always matches
# the published release (main may be bumped ahead).
#
# After this workflow runs, a maintainer can submit the microsoft/vcpkg PR
# with one command (no flags needed):
#
#   cd scripts && python post-release-vcpkg.py
#
# (Requires 'gh auth login'; the script clones microsoft/vcpkg automatically.)
#
# More info: scripts/post-release-vcpkg.py

name: Post-Release vcpkg Update Info

on:
  release:
    types: [published]

jobs:
  vcpkg-update-info:
    # Skip pre-releases; only process official releases.
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          # Use the release tag so VERSION matches the published release,
          # even if main has been bumped ahead.
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate vcpkg update plan
        id: plan
        shell: bash
        run: |
          set -o pipefail
          python $GITHUB_WORKSPACE/scripts/post-release-vcpkg.py \
            --plan \
            --out-dir /tmp/post-release-vcpkg \
            2>&1 | tee /tmp/vcpkg_plan.txt

      - name: Post plan as job summary
        if: always()
        shell: bash
        run: |
          echo "## TA-Lib vcpkg Update Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/vcpkg_plan.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/vcpkg_plan.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No output captured._" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Next Step" >> "$GITHUB_STEP_SUMMARY"
          echo "Run on the main branch of the original ta-lib repo (needs \`gh auth login\`):" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "cd scripts && python post-release-vcpkg.py" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

