# Automatically generates the TA-Lib vcpkg update plan when a new release is
# published, and posts it as a workflow summary.
#
# No PAT or secret is required — the script only reads public GitHub APIs and
# computes the SHA512 of the release tarball.
#
# After this workflow runs, a maintainer can copy the SHA512 from the summary
# and submit the microsoft/vcpkg PR with one local command:
#
#   cd scripts && python post-release-vcpkg.py --perform-local-changes --create-pr
#
# (Requires 'gh auth login' and a fork of microsoft/vcpkg.)
#
# More info: scripts/post-release-vcpkg.py

name: Post-Release vcpkg Update Info

on:
  release:
    types: [published]

jobs:
  vcpkg-update-info:
    # Skip pre-releases; only process official releases.
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate vcpkg update plan
        id: plan
        shell: bash
        run: |
          set -o pipefail
          python $GITHUB_WORKSPACE/scripts/post-release-vcpkg.py \
            --out-dir /tmp/post-release-vcpkg \
            2>&1 | tee /tmp/vcpkg_plan.txt

      - name: Post plan as job summary
        if: always()
        shell: bash
        run: |
          echo "## TA-Lib vcpkg Update Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/vcpkg_plan.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/vcpkg_plan.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No output captured._" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Next Steps" >> "$GITHUB_STEP_SUMMARY"
          echo "Run locally to prepare and submit the microsoft/vcpkg PR:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "cd scripts && python post-release-vcpkg.py --perform-local-changes --create-pr" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Prerequisites: \`gh auth login\` + a fork of microsoft/vcpkg (the script clones it automatically)." >> "$GITHUB_STEP_SUMMARY"
