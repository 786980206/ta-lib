name: MA
group: Overlap Studies
description: Moving average
inputs:
  - name: inReal
    type: real
optional_inputs:
  - name: optInTimePeriod
    type: integer
    range: [1, 100000]
    default: 30
  - name: optInMAType
    type: integer
    range: [0, 8]
    default: 0
outputs:
  - name: outReal
    type: real
lookback: |
  int retValue;
  if( optInTimePeriod <= 1 ) {
    return 0;
  }
  switch( optInMAType ) {
    case MAType_SMA:
      retValue = SMA_Lookback(optInTimePeriod);
      break;
    case MAType_EMA:
      retValue = EMA_Lookback(optInTimePeriod);
      break;
    default:
      retValue = 0;
      break;
  }
  return retValue;
